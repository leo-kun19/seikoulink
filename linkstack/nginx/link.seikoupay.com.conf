# Nginx config KHUSUS untuk subdomain link.seikoupay.com
# TIDAK mengganggu www.seikoupay.com, mail.seikoupay.com, atau domain utama
#
# DNS sudah diatur di Cloudflare (A record: link -> IP VPS)
#
# Cara pakai:
# 1. Copy file ini ke /etc/nginx/sites-available/
# 2. ln -s /etc/nginx/sites-available/link.seikoupay.com.conf /etc/nginx/sites-enabled/
# 3. sudo nginx -t && sudo systemctl reload nginx
#
# Cloudflare Settings:
# - SSL/TLS mode: "Full" (bukan Full Strict, kecuali pakai origin cert)
# - Pastikan HANYA subdomain "link" yang proxied, jangan wildcard

# Trust Cloudflare IP ranges (untuk dapet real IP visitor)
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
real_ip_header CF-Connecting-IP;

server {
    listen 80;
    listen 443 ssl http2;
    server_name link.seikoupay.my.id;

    # Cloudflare Origin Certificate (valid 15 years, free from Cloudflare)
    ssl_certificate /etc/ssl/cloudflare-origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://127.0.0.1:3500;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Compression (text/html is gzipped by default)
        gzip on;
        gzip_types text/css application/javascript application/json application/xml text/xml image/svg+xml;
        gzip_min_length 1000;
        gzip_comp_level 6;
        gzip_vary on;
    }

    # Static files caching (long-cache with versioned URLs)
    location /static/ {
        proxy_pass http://127.0.0.1:3500/static/;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        gzip on;
        gzip_types text/css application/javascript image/svg+xml application/json;
    }

    # Sitemap & robots dengan caching pendek
    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:3500/sitemap.xml;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        add_header Content-Type "application/xml; charset=utf-8";
    }

    location = /robots.txt {
        proxy_pass http://127.0.0.1:3500/robots.txt;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:3500/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Block common exploit paths
    location ~ /\. {
        deny all;
    }

    location ~ ^/(wp-admin|wp-login|xmlrpc|phpmyadmin) {
        return 444;
    }

    # Rate limiting for API
    location /api/ {
        proxy_pass http://127.0.0.1:3500/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        limit_req zone=api burst=20 nodelay;
    }

    # Block direct IP access (hanya terima dari Cloudflare atau domain yang benar)
    if ($host !~ ^link\.seikoupay\.my\.id$) {
        return 444;
    }
}

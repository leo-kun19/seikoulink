<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - SeikouLink</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/auth.css?v=3">
</head>
<body>
  <div class="auth-container">
    <a href="/" class="auth-brand">SeikouLink</a>
    <div class="auth-card">
      <h1>Password Baru</h1>
      <p class="auth-subtitle">Masukkan password baru kamu</p>
      <form id="resetForm">
        <div class="form-group">
          <label for="password">Password Baru</label>
          <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password" placeholder="Minimal 8 karakter">
        </div>
        <div class="form-group">
          <label for="confirmPassword">Konfirmasi Password</label>
          <input type="password" id="confirmPassword" required minlength="8" autocomplete="new-password" placeholder="Ulangi password">
        </div>
        <div class="form-error" id="formError"></div>
        <div class="form-success" id="formSuccess" hidden></div>
        <button type="submit" class="btn-submit">Reset Password</button>
      </form>
      <p class="auth-footer"><a href="/login">Kembali ke Login</a></p>
    </div>
  </div>
  <script defer>
    var params = new URLSearchParams(window.location.search);
    var token = params.get('token');

    if (!token) {
      document.getElementById('formError').textContent = 'Link reset tidak valid.';
      document.querySelector('.btn-submit').disabled = true;
    }

    document.getElementById('resetForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var error = document.getElementById('formError');
      var success = document.getElementById('formSuccess');
      var btn = this.querySelector('.btn-submit');
      var password = document.getElementById('password').value;
      var confirm = document.getElementById('confirmPassword').value;

      error.textContent = '';
      success.hidden = true;

      if (password !== confirm) {
        error.textContent = 'Password tidak cocok.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Memproses...';

      try {
        var res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': (document.cookie.match(/(?:^|; )_csrf=([^;]*)/) || [])[1] || '' },
          body: JSON.stringify({ token: token, password: password })
        });
        var data = await res.json();
        if (res.ok) {
          success.textContent = 'Password berhasil direset! Redirect ke login...';
          success.hidden = false;
          setTimeout(function() { window.location.href = '/login'; }, 2000);
        } else {
          error.textContent = data.error;
          btn.disabled = false;
          btn.textContent = 'Reset Password';
        }
      } catch (err) {
        error.textContent = 'Terjadi kesalahan.';
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>

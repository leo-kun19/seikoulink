<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lupa Password - SeikouLink</title>
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://link.seikoupay.my.id/forgot-password">
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/auth.css?v=3">
</head>
<body>
  <div class="auth-container">
    <a href="/" class="auth-brand">SeikouLink</a>
    <div class="auth-card">
      <h1>Lupa Password</h1>
      <p class="auth-subtitle">Masukkan email untuk reset password</p>
      <form id="forgotForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" placeholder="email@contoh.com">
        </div>
        <div class="form-error" id="formError"></div>
        <div class="form-success" id="formSuccess" hidden></div>
        <button type="submit" class="btn-submit">Kirim Link Reset</button>
      </form>
      <p class="auth-footer">Ingat password? <a href="/login">Masuk</a></p>
    </div>
  </div>
  <script defer>
    document.getElementById('forgotForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var error = document.getElementById('formError');
      var success = document.getElementById('formSuccess');
      var btn = this.querySelector('.btn-submit');
      error.textContent = '';
      success.hidden = true;
      btn.disabled = true;
      btn.textContent = 'Mengirim...';

      try {
        var res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': (document.cookie.match(/(?:^|; )_csrf=([^;]*)/) || [])[1] || '' },
          body: JSON.stringify({ email: document.getElementById('email').value })
        });
        var data = await res.json();
        if (res.ok) {
          success.textContent = 'Link reset sudah dikirim ke email kamu. Cek inbox/spam.';
          success.hidden = false;
          this.reset();
        } else {
          error.textContent = data.error;
        }
      } catch (err) {
        error.textContent = 'Terjadi kesalahan.';
      }
      btn.disabled = false;
      btn.textContent = 'Kirim Link Reset';
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk - SeikouLink | Login Akun Link in Bio</title>
  <meta name="description" content="Masuk ke akun SeikouLink untuk kelola halaman link-in-bio kamu.">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://link.seikoupay.my.id/login">
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/auth.css?v=4">
</head>
<body>
  <div class="auth-container">
    <a href="/" class="auth-brand">SeikouLink</a>
    <div class="auth-card">
      <h1>Masuk</h1>
      <p class="auth-subtitle">Kelola link-in-bio kamu</p>
      <form id="loginForm">
        <div class="form-group">
          <label for="login">Username atau Email</label>
          <input type="text" id="login" name="login" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <div class="form-error" id="formError"></div>
        <button type="submit" class="btn-submit">Masuk</button>
      </form>
      <p class="auth-footer">Belum punya akun? <a href="/register">Daftar gratis</a></p>
      <p class="auth-footer"><a href="/forgot-password">Lupa password?</a></p>
      <div class="auth-divider"><span>atau</span></div>
      <a href="/api/auth/google" class="btn-google">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Lanjutkan dengan Google
      </a>
    </div>
  </div>
  <!-- Error/info modal (CSS-styled, controlled by auth.js based on ?error= URL param) -->
  <div class="modal-overlay" id="errorModal" hidden>
    <div class="error-modal-card">
      <div class="error-modal-icon" id="errorModalIcon">⚠</div>
      <h3 class="error-modal-title" id="errorModalTitle">Notifikasi</h3>
      <p class="error-modal-message" id="errorModalMessage"></p>
      <button class="error-modal-close" id="errorModalClose">Mengerti</button>
    </div>
  </div>

  <script src="/static/js/auth.js?v=2" defer></script>
</body>
</html>

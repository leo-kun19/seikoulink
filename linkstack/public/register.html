<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Gratis - SeikouLink | Buat Link in Bio Sekarang</title>
  <meta name="description" content="Daftar gratis di SeikouLink untuk buat halaman link-in-bio kamu sendiri. 100% gratis tanpa langganan.">
  <link rel="canonical" href="https://link.seikoupay.my.id/register">
  <meta property="og:title" content="Daftar Gratis - SeikouLink">
  <meta property="og:description" content="Daftar gratis untuk buat halaman link-in-bio. Tanpa kartu kredit, tanpa batas waktu.">
  <meta property="og:url" content="https://link.seikoupay.my.id/register">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/auth.css?v=3">
</head>
<body>
  <div class="auth-container">
    <a href="/" class="auth-brand">SeikouLink</a>
    <div class="auth-card">
      <h1>Daftar Gratis</h1>
      <p class="auth-subtitle">Buat halaman link-in-bio kamu</p>
      <form id="registerForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required pattern="[a-z0-9_-]{3,30}" autocomplete="username" placeholder="huruf kecil, angka, dash">
          <span class="form-hint">link.seikoupay.com/<strong id="usernamePreview">username</strong></span>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password" placeholder="Minimal 8 karakter">
        </div>
        <div class="form-error" id="formError"></div>
        <button type="submit" class="btn-submit">Buat Akun</button>
      </form>
      <p class="auth-footer">Sudah punya akun? <a href="/login">Masuk</a></p>
      <div class="auth-divider"><span>atau</span></div>
      <a href="/api/auth/google" class="btn-google">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Daftar dengan Google
      </a>
    </div>
  </div>
  <script src="/static/js/auth.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>seikouverse — aesthetic</title>
  <link href="https://fonts.googleapis.com/css2?family=Monoton&family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --pink:#ff77c6;
      --cyan:#7df9ff;
      --purple:#bd5fff;
      --magenta:#ff00b3;
      --void:#0d0026;
      --void-2:#1a0042;
      --bone:#ffeefa;
    }
    body{
      font-family:'Inter',sans-serif;
      background:linear-gradient(180deg, #0d0026 0%, #2d0066 50%, #4d0099 100%);
      color:var(--bone);
      min-height:100vh;
      padding:2rem 1rem;
      position:relative;
      overflow-x:hidden;
    }
    body::before{
      content:'';
      position:fixed;
      bottom:-20%;
      left:-10%;
      right:-10%;
      height:60%;
      background:
        repeating-linear-gradient(0deg, transparent 0, transparent 30px, rgba(255,119,198,0.3) 30px, rgba(255,119,198,0.3) 31px),
        repeating-linear-gradient(90deg, transparent 0, transparent 30px, rgba(125,249,255,0.3) 30px, rgba(125,249,255,0.3) 31px);
      transform:perspective(400px) rotateX(60deg);
      transform-origin:center top;
      pointer-events:none;
      z-index:0;
      mask-image:linear-gradient(180deg, transparent 0%, black 30%, black 100%);
    }
    body::after{
      content:'';
      position:fixed;
      top:10%;
      right:5%;
      width:200px;
      height:200px;
      background:radial-gradient(circle, var(--magenta) 0%, transparent 70%);
      filter:blur(40px);
      pointer-events:none;
      z-index:0;
      animation:float 8s ease-in-out infinite;
    }
    @keyframes float{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-30px)}
    }
    .sun{
      position:fixed;
      top:15%;
      left:50%;
      transform:translateX(-50%);
      width:300px;
      height:300px;
      background:linear-gradient(180deg, #ff7eb9 0%, #ff8fa3 30%, #ffa57a 60%, #ffd4a3 100%);
      border-radius:50%;
      pointer-events:none;
      z-index:0;
      box-shadow:0 0 80px rgba(255,119,198,0.6);
      mask-image:repeating-linear-gradient(0deg, black 0, black 8px, transparent 8px, transparent 14px);
      -webkit-mask-image:repeating-linear-gradient(0deg, black 0, black 8px, transparent 8px, transparent 14px);
    }
    .container{
      max-width:520px;
      margin:0 auto;
      position:relative;
      z-index:2;
      padding-top:2rem;
    }
    .top-jp{
      font-family:'Noto Sans JP',sans-serif;
      font-weight:700;
      font-size:0.85rem;
      letter-spacing:0.4em;
      color:var(--cyan);
      text-align:center;
      margin-bottom:0.5rem;
      text-shadow:0 0 8px var(--cyan);
    }
    .profile{
      text-align:center;
      margin-bottom:3rem;
      padding-top:8rem;
    }
    .avatar{
      width:130px;
      height:130px;
      margin:0 auto 1.5rem;
      background:linear-gradient(135deg, var(--cyan) 0%, var(--pink) 100%);
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:'Monoton',cursive;
      font-size:3.5rem;
      color:var(--void);
      box-shadow:
        0 0 30px rgba(255,119,198,0.6),
        0 0 60px rgba(125,249,255,0.4);
      position:relative;
    }
    .avatar::before{
      content:'';
      position:absolute;
      inset:-8px;
      border:2px solid var(--cyan);
      border-radius:50%;
      animation:rotate 12s linear infinite;
      opacity:0.5;
    }
    .avatar::after{
      content:'';
      position:absolute;
      inset:-16px;
      border:1px dashed var(--pink);
      border-radius:50%;
      animation:rotate 18s linear infinite reverse;
      opacity:0.3;
    }
    @keyframes rotate{
      from{transform:rotate(0)}
      to{transform:rotate(360deg)}
    }
    .name{
      font-family:'Monoton',cursive;
      font-size:clamp(2.5rem, 8vw, 4rem);
      letter-spacing:0.05em;
      line-height:1;
      margin-bottom:0.5rem;
      background:linear-gradient(180deg, var(--cyan) 0%, var(--pink) 50%, var(--magenta) 100%);
      background-clip:text;
      -webkit-background-clip:text;
      color:transparent;
      text-shadow:
        2px 2px 0 var(--magenta),
        4px 4px 0 var(--purple);
    }
    .name-jp{
      font-family:'Noto Sans JP',sans-serif;
      font-weight:700;
      font-size:1rem;
      letter-spacing:0.5em;
      color:var(--pink);
      margin-bottom:1rem;
      text-shadow:0 0 8px rgba(255,119,198,0.6);
    }
    .bio{
      font-family:'Inter',sans-serif;
      font-size:0.95rem;
      line-height:1.6;
      color:var(--bone);
      max-width:380px;
      margin:0 auto;
      padding:0.875rem 1.25rem;
      background:rgba(13,0,38,0.5);
      backdrop-filter:blur(10px);
      border:1px solid var(--cyan);
      box-shadow:
        0 0 20px rgba(125,249,255,0.3),
        inset 0 0 20px rgba(255,119,198,0.1);
    }
    .section-label{
      font-family:'Bebas Neue',sans-serif;
      font-size:1.2rem;
      letter-spacing:0.4em;
      color:var(--cyan);
      margin:2rem 0 1rem;
      text-align:center;
      text-shadow:0 0 12px var(--cyan);
    }
    .section-label::before, .section-label::after{
      content:'◆';
      margin:0 0.75rem;
      color:var(--pink);
      text-shadow:0 0 8px var(--pink);
    }
    .links{
      display:flex;
      flex-direction:column;
      gap:0.875rem;
    }
    .link-btn{
      display:flex;
      align-items:center;
      gap:1rem;
      padding:1rem 1.25rem;
      background:linear-gradient(135deg, rgba(255,119,198,0.15) 0%, rgba(125,249,255,0.15) 100%);
      backdrop-filter:blur(10px);
      border:1px solid var(--pink);
      text-decoration:none;
      color:var(--bone);
      font-family:'Inter',sans-serif;
      font-size:0.95rem;
      font-weight:500;
      transition:all .3s ease;
      position:relative;
      overflow:hidden;
      box-shadow:0 0 15px rgba(255,119,198,0.2);
    }
    .link-btn::before{
      content:'';
      position:absolute;
      top:0;
      left:-100%;
      width:100%;
      height:100%;
      background:linear-gradient(90deg, transparent, rgba(125,249,255,0.4), transparent);
      transition:left .6s;
    }
    .link-btn:hover{
      border-color:var(--cyan);
      box-shadow:
        0 0 25px rgba(125,249,255,0.5),
        0 0 50px rgba(255,119,198,0.3);
      transform:translateY(-2px);
    }
    .link-btn:hover::before{left:100%}
    .link-icon{
      width:36px;
      height:36px;
      background:linear-gradient(135deg, var(--cyan) 0%, var(--pink) 100%);
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
      font-family:'Monoton',cursive;
      color:var(--void);
      font-size:1.1rem;
    }
    .link-title{flex:1;letter-spacing:0.02em}
    .link-arrow{
      font-family:'Bebas Neue',sans-serif;
      color:var(--cyan);
      font-size:1.2rem;
      letter-spacing:0.1em;
    }
    .footer{
      text-align:center;
      margin-top:3rem;
      padding-top:1.5rem;
      font-family:'Noto Sans JP',sans-serif;
      font-weight:400;
      font-size:0.75rem;
      letter-spacing:0.5em;
      color:var(--pink);
      text-shadow:0 0 8px rgba(255,119,198,0.5);
    }
    .footer-en{
      font-family:'Bebas Neue',sans-serif;
      font-size:0.85rem;
      letter-spacing:0.4em;
      color:var(--cyan);
      margin-top:0.5rem;
      text-shadow:0 0 8px var(--cyan);
    }
  </style>
</head>
<body>
  <div class="sun"></div>

  <main class="container">
    <div class="top-jp">エ ス テ テ ィ ッ ク</div>

    <header class="profile">
      <div class="avatar">S</div>
      <h1 class="name">SEIKOUVERSE</h1>
      <p class="name-jp">セ イ コ ウ</p>
      <p class="bio">Open Jasa Web Bisnis / UMKM dan Web Joki ✦</p>
    </header>

    <div class="section-label">LINKS</div>
    <div class="links">
      <a href="#" class="link-btn">
        <span class="link-icon">W</span>
        <span class="link-title">Web untuk Bisnis dan UMKM</span>
        <span class="link-arrow">▶</span>
      </a>
      <a href="#" class="link-btn">
        <span class="link-icon">P</span>
        <span class="link-title">Portofolio</span>
        <span class="link-arrow">▶</span>
      </a>
    </div>

    <div class="section-label">SOCIAL</div>
    <div class="links">
      <a href="#" class="link-btn">
        <span class="link-icon">I</span>
        <span class="link-title">Instagram</span>
        <span class="link-arrow">▶</span>
      </a>
      <a href="#" class="link-btn">
        <span class="link-icon">X</span>
        <span class="link-title">Akun Joki X</span>
        <span class="link-arrow">▶</span>
      </a>
      <a href="#" class="link-btn">
        <span class="link-icon">T</span>
        <span class="link-title">Testimoni</span>
        <span class="link-arrow">▶</span>
      </a>
    </div>

    <div class="section-label">CONTACT</div>
    <div class="links">
      <a href="#" class="link-btn">
        <span class="link-icon">W</span>
        <span class="link-title">WhatsApp Business</span>
        <span class="link-arrow">▶</span>
      </a>
    </div>

    <div class="footer">あ り が と う</div>
    <div class="footer-en">— powered by seikoulink —</div>
  </main>
</body>
</html>
